name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            binary: dist/ansitelnet
            extra_deps: ''
          - os: windows-latest
            label: windows-x86_64
            binary: dist/ansitelnet.exe
            extra_deps: windows-curses

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx-ucl

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx --no-progress -y

      - name: Install dependencies
        run: pip install pyinstaller ${{ matrix.extra_deps }}

      - name: Build
        run: python -m PyInstaller --clean ansitelnet.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansitelnet-${{ matrix.label }}
          path: ${{ matrix.binary }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary }}
          name: ansitelnet ${{ github.ref_name }}
